<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Rentzoo</title>
  
  <meta property="og:title" content="404 Page Not Found — Rentzoo">
  <meta property="og:image" content="https://rentzoo.in/assets/images/logo.png">
  <meta property="og:type" content="website">

  <link rel="icon" href="assets/images/favicon.png" type="image/png">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
  <meta name="theme-color" content="#0d838a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Rentzoo">
  <link rel="stylesheet" href="styles.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 100px 20px;
      background: var(--gray-100);
    }
    .error-code {
      font-size: 8rem;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
      margin-bottom: 20px;
      letter-spacing: -0.05em;
    }
    .error-title {
      font-size: 2rem;
      color: var(--black);
      font-weight: 600;
      margin-bottom: 16px;
    }
    .error-msg {
      font-size: 1rem;
      color: var(--gray-600);
      max-width: 400px;
      margin-bottom: 40px;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <div class="container nav-inner">
      <a href="/" class="nav-logo">
        <img src="assets/images/logo.png" alt="Rentzoo">
      </a>

      <ul class="nav-links" id="navLinks">
        <li><a href="/">Home</a></li>
        <li><a href="/about.html">About</a></li>
        <li><a href="/catalog.html">Catalog</a></li>
        <li><a href="/index.html#why-us">Why Us</a></li>
        <li><a href="/contact.html">Contact</a></li>
      </ul>

      <div class="nav-cta">
        <a href="https://wa.me/917013708828" class="btn btn-primary" target="_blank" rel="noopener">
          Get in Touch
        </a>
        <button class="hamburger" id="hamburger" aria-label="Toggle Menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>
  <div class="nav-overlay" id="navOverlay"></div>

  <div class="error-page">
    <div class="error-code reveal">404</div>
    <h1 class="error-title reveal">Page not found</h1>
    <p class="error-msg reveal">We couldn't track down the page you were looking for. It might have been moved or doesn't exist.</p>
    <div class="reveal">
        <a href="/" class="btn btn-primary">Return to Homepage</a>
    </div>
  </div>

  <script src="script.js"></script>
